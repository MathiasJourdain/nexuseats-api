version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexuseats
      POSTGRES_PASSWORD: nexuseats_dev
      POSTGRES_DB: nexuseats
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: nexuseats
      RABBITMQ_DEFAULT_PASS: secret

volumes:
  pgdata: