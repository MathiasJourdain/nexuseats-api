name: CI/CD NexusEats

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # 🧪 JOB 1 : TESTS (Lint + Build + Tests)
  test:
    runs-on: ubuntu-latest
    services:
      # On lance les services nécessaires pour les tests d'intégration
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nexuseats
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: nexuseats_db
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test

  # 📦 JOB 2 : BUILD & PUSH (Vers GHCR - GitHub Container Registry)
  build-and-push:
    needs: test # On ne build que si les tests passent !
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest

  # 🚀 JOB 3 : DEPLOY (Simulé via SSH)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Ce job est configuré mais échouera si tu n'as pas de vrai serveur SSH configuré
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /app/nexuseats
            docker compose pull
            docker compose up -d